<div
    class="modal-custom fade rounded"
    style="opacity: 100;"
>
    <div class="modal-dialog modal-dialog-centered ">
        <div class="modal-content bg-carmel border-none">
            <div class="modal-header bg-carmel-header border-none">
                <h5 class="modal-title border-none text-white">
                    {{title_modal}}
                </h5>
                <button type="button" class="close text-white" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body bg-carmel-body text-white border-none">
                {{content}}
            </div>
            <div class="modal-footer border-none">
                <button
                    class="btn btn-success"
                >
                    
                </button>
            </div>
        </div>
    </div>
</div>
